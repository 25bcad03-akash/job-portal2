<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Elevate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .admin-layout { display: flex; gap: 30px; margin-top: 30px; }
        .sidebar { width: 250px; }
        .sidebar ul { list-style: none; }
        .sidebar li { margin-bottom: 10px; }
        .sidebar a { display: block; padding: 10px 15px; border-radius: 6px; background: #fff; border: 1px solid var(--border); transition: 0.2s;}
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .content { flex: 1; min-width: 0; }
        
        .list-item { background: #fff; padding: 20px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Elevate Admin</a>
        <div class="nav-links">
            <a href="#" id="nav-logout-btn" class="btn btn-outline" style="padding: 5px 15px;">Logout</a>
        </div>
    </nav>
    <main class="container">
        <div class="dashboard-header">
            <h1>Employer Dashboard</h1>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>Total Jobs Posted</h3>
                <div class="stat-value" id="stat-jobs">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Applications</h3>
                <div class="stat-value" id="stat-apps">-</div>
            </div>
        </div>

        <div class="admin-layout">
            <div class="sidebar">
                <ul>
                    <li><a href="#" class="active" onclick="switchTab('jobs')">Manage Jobs</a></li>
                    <li><a href="#" onclick="switchTab('apps')">Manage Applications</a></li>
                    <li><a href="#" onclick="switchTab('post')">Post New Job</a></li>
                </ul>
            </div>
            <div class="content">
                <!-- Jobs Tab -->
                <div id="tab-jobs" class="tab-content active">
                    <h2>Your Job Postings</h2>
                    <div id="admin-jobs-list" style="margin-top:20px;">Loading...</div>
                </div>

                <!-- Applications Tab -->
                <div id="tab-apps" class="tab-content">
                    <h2>Received Applications</h2>
                    <div id="admin-apps-list" style="margin-top:20px;">Loading...</div>
                </div>

                <!-- Post Job Tab -->
                <div id="tab-post" class="tab-content">
                    <h2>Create New Job Posting</h2>
                    <form id="post-job-form" style="background:#fff; padding:30px; border-radius:8px; border:1px solid var(--border); margin-top:20px;">
                        <div class="form-group">
                            <label>Job Title</label>
                            <input type="text" id="j-title" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Company Name</label>
                            <input type="text" id="j-company" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="j-location" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Salary Range</label>
                            <input type="text" id="j-salary" class="form-control" placeholder="e.g. $80,000 - $100,000" required>
                        </div>
                        <div class="form-group">
                            <label>Job Type</label>
                            <select id="j-type" class="form-control">
                                <option>Full-time</option>
                                <option>Part-time</option>
                                <option>Contract</option>
                                <option>Remote</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="j-desc" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Requirements (comma separated)</label>
                            <input type="text" id="j-reqs" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Publish Job</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        const API = 'http://localhost:5000/api';
        
        document.getElementById('nav-logout-btn').addEventListener('click', logout);

        const switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
            
            if(tab === 'jobs') loadAdminJobs();
            if(tab === 'apps') loadAdminApps();
        };

        const initAdmin = () => {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            loadAdminJobs();
            loadAdminApps();
        };

        const loadAdminJobs = async () => {
            try {
                const res = await fetch(`${API}/jobs`);
                const jobs = await res.json();
                
                // Filter jobs for this admin (assuming backend sends all for now, better to filter in backend)
                // For demo, we are showing all jobs. In a real app, only jobs of the logged-in admin.
                const user = getUser();
                const myJobs = jobs.filter(j => j.postedBy._id === user.id || j.postedBy === user.id);
                document.getElementById('stat-jobs').innerText = myJobs.length;

                const list = document.getElementById('admin-jobs-list');
                list.innerHTML = '';
                myJobs.forEach(job => {
                    list.innerHTML += `
                        <div class="list-item">
                            <div style="display:flex; justify-content:space-between;">
                                <h3>${job.title}</h3>
                                <button class="btn btn-outline" style="color:red; border-color:red; padding: 5px 10px;" onclick="deleteJob('${job._id}')">Delete</button>
                            </div>
                            <p style="color:var(--text-muted)">${job.company} • ${job.location} • ${job.type}</p>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        };

        const loadAdminApps = async () => {
            try {
                const res = await fetch(`${API}/applications`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const apps = await res.json();
                document.getElementById('stat-apps').innerText = apps.length;

                const list = document.getElementById('admin-apps-list');
                list.innerHTML = '';
                apps.forEach(app => {
                    list.innerHTML += `
                        <div class="list-item">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div>
                                    <h4 style="margin-bottom:5px;">Applicant: ${app.applicant?.name || 'Unknown'} (${app.applicant?.email || 'N/A'})</h4>
                                    <p style="font-size: 0.9rem;"><strong>Job:</strong> ${app.job?.title || 'Unknown Job'}</p>
                                    <p style="font-size: 0.9rem; margin-top:5px;"><strong>Resume:</strong> <a href="http://localhost:5000/${app.resumePath.replace(/\\/g, '/')}" target="_blank" style="color:var(--primary); text-decoration:underline;">View PDF</a></p>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:5px; align-items:flex-end;">
                                    <span style="font-size:0.8rem; font-weight:600; padding:3px 8px; border-radius:12px; border:1px solid #ccc; background:#f5f5f5;">Current: ${app.status}</span>
                                    <select onchange="updateStatus('${app._id}', this.value)" style="padding:5px; font-size:0.8rem; margin-top:5px; border-radius:4px; border:1px solid var(--border);">
                                        <option value="">Update Status...</option>
                                        <option value="Reviewed">Reviewed</option>
                                        <option value="Accepted">Accepted</option>
                                        <option value="Rejected">Rejected</option>
                                    </select>
                                </div>
                            </div>
                            <div style="margin-top:10px; font-size: 0.85rem; color:var(--text-muted); background:var(--bg-color); padding:10px; border-radius:4px;">
                                <strong>Cover Letter:</strong><br/>
                                ${app.coverLetter || 'No cover letter provided.'}
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        };

        const deleteJob = async (id) => {
            if(!confirm('Are you sure you want to delete this job?')) return;
            try {
                await fetch(`${API}/jobs/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                loadAdminJobs();
            } catch (err) { console.error(err); }
        };

        const updateStatus = async (id, status) => {
            if(!status) return;
            try {
                await fetch(`${API}/applications/${id}/status`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });
                loadAdminApps();
            } catch (err) { console.error(err); }
        };

        document.getElementById('post-job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('j-title').value,
                company: document.getElementById('j-company').value,
                location: document.getElementById('j-location').value,
                salary: document.getElementById('j-salary').value,
                type: document.getElementById('j-type').value,
                description: document.getElementById('j-desc').value,
                requirements: document.getElementById('j-reqs').value.split(',').map(s=>s.trim())
            };

            try {
                const res = await fetch(`${API}/jobs`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                if(res.ok) {
                    alert('Job posted!');
                    e.target.reset();
                    switchTab('jobs');
                } else {
                    alert('Error posting job');
                }
            } catch (err) { console.error(err); }
        });

        document.addEventListener('DOMContentLoaded', initAdmin);
    </script>
</body>
</html>
